spring:
  data:
    mongodb:
      host: notification-mongodb
      username: user
      password: ${MONGODB_PASSWORD}
      database: piggymetrics
      port: 27017
  mail:
    host: smtp.gmail.com
    port: 465
    username: dev-user
    password: dev-password
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          ssl:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth-service:5000/uaa
      client:
        provider:
          auth-service:
            token-uri: http://auth-service:5000/uaa/oauth2/token
        registration:
          auth-service:
            provider: auth-service
            authorization-grant-type: client_credentials
            client-id: notification-service
            client-secret: ${NOTIFICATION_SERVICE_PASSWORD}
            scope: server

app:
  oauth2:
    client-registration-id: auth-service

server:
  servlet:
    context-path: /notifications
  port: 8000

remind:
  cron: 0 0 0 * * *
  email:
    text: "Hey, {0}! We''ve missed you here on PiggyMetrics. It''s time to check your budget statistics.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics reminder

backup:
  cron: 0 0 12 * * *
  email:
    text: "Howdy, {0}. Your account backup is ready.\r\n\r\nCheers,\r\nPiggyMetrics team"
    subject: PiggyMetrics account backup
    attachment: backup.json
